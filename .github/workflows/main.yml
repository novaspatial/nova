name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Next Lint
        run: npx next lint

      - name: Run Next Build
        run: npx next build

      - name: Run Vitest (Placeholder)
        run: |
          echo "TODO: Replace this step with your vitest command (e.g., npx vitest run) once configured."
